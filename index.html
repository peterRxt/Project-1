<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Links Manager</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f6f9;
      min-height: 100vh;
    }

    .login-container {
      max-width: 400px;
      margin: 100px auto;
    }

    .app-container {
      display: none;
    }

    .card {
      border: none;
      border-radius: 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    .header-box {
      background: linear-gradient(135deg, #0d6efd, #0b5ed7);
      color: white;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .repo-link {
      text-decoration: none;
      font-weight: 600;
    }

    .repo-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="container login-container" id="loginSection">
    <div class="card p-4">
      <h3 class="text-center mb-4">Projects Login</h3>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="passwordInput" placeholder="Enter Password">
      </div>

      <button class="btn btn-primary w-100" onclick="login()">Login</button>

      <div class="text-danger mt-3 text-center" id="loginError"></div>
    </div>
  </div>

  <!-- APP -->
  <div class="container py-4 app-container" id="appSection">

    <div class="header-box">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h2>Project Links Manager</h2>
          <p class="mb-0">
            
        </div>

        <button class="btn btn-light" onclick="logout()">
          Logout
        </button>
      </div>
    </div>

    <!-- ADD FORM -->
    <div class="card p-4 mb-4">
      <h4 class="mb-3">Add New Project</h4>

      <div class="row">
        <div class="col-md-4 mb-3">
          <label class="form-label">App Name</label>
          <input type="text" class="form-control" id="appName">
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label">Description</label>
          <input type="text" class="form-control" id="appDescription">
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label">Project Link</label>
          <input type="url" class="form-control" id="appLink">
        </div>
      </div>

      <button class="btn btn-success" onclick="addProject()">
        Add Project
      </button>
    </div>

    <!-- PROJECT LIST -->
    <div class="card p-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>Saved Projects</h4>
        <span class="badge bg-primary" id="projectCount">0 Projects</span>
      </div>

      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead class="table-dark">
            <tr>
              <th>#</th>
              <th>App Name</th>
              <th>Description</th>
              <th>Link</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody id="projectTableBody"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    const PASSWORD = "projects";

    let projects = JSON.parse(localStorage.getItem("projectsList")) || [];

    // LOGIN
    function login() {
      const password = document.getElementById("passwordInput").value;
      const error = document.getElementById("loginError");

      if (password === PASSWORD) {
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("appSection").style.display = "block";

        sessionStorage.setItem("loggedIn", "true");

        renderProjects();
      } else {
        error.innerText = "Invalid Password";
      }
    }

    // AUTO LOGIN CHECK
    window.onload = function () {
      if (sessionStorage.getItem("loggedIn") === "true") {
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("appSection").style.display = "block";

        renderProjects();
      }
    };

    // LOGOUT
    function logout() {
      sessionStorage.removeItem("loggedIn");

      document.getElementById("appSection").style.display = "none";
      document.getElementById("loginSection").style.display = "block";

      document.getElementById("passwordInput").value = "";
    }

    // ADD PROJECT
    function addProject() {
      const name = document.getElementById("appName").value.trim();
      const description = document.getElementById("appDescription").value.trim();
      const link = document.getElementById("appLink").value.trim();

      if (!name || !description || !link) {
        alert("Please fill all fields.");
        return;
      }

      const project = {
        name,
        description,
        link
      };

      projects.push(project);

      localStorage.setItem("projectsList", JSON.stringify(projects));

      document.getElementById("appName").value = "";
      document.getElementById("appDescription").value = "";
      document.getElementById("appLink").value = "";

      renderProjects();
    }

    // RENDER PROJECTS
    function renderProjects() {
      const tableBody = document.getElementById("projectTableBody");

      tableBody.innerHTML = "";

      projects.forEach((project, index) => {
        tableBody.innerHTML += `
          <tr>
            <td>${index + 1}</td>
            <td>${project.name}</td>
            <td>${project.description}</td>
            <td>
              <a href="${project.link}" target="_blank" class="repo-link">
                Open Link
              </a>
            </td>
            <td>
              <button class="btn btn-danger btn-sm"
                onclick="deleteProject(${index})">
                Delete
              </button>
            </td>
          </tr>
        `;
      });

      document.getElementById("projectCount").innerText =
        `${projects.length} Projects`;
    }

    // DELETE PROJECT
    function deleteProject(index) {
      if (confirm("Delete this project?")) {
        projects.splice(index, 1);

        localStorage.setItem("projectsList", JSON.stringify(projects));

        renderProjects();
      }
    }
  </script>

</body>
</html>
